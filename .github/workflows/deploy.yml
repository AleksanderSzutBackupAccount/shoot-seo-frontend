name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/shoot-seo

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          SHA="${GITHUB_SHA::12}"
          docker build -t "$IMAGE_BASE/frontend:$SHA" -t "$IMAGE_BASE/frontend:latest" .
          docker push --all-tags "$IMAGE_BASE/frontend"

      - name: Get cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GCP_REGION }}

      - name: Roll out
        run: |
          SHA="${GITHUB_SHA::12}"
          PROFILE="${{ vars.DEPLOY_PROFILE || 'budget' }}"
          kubectl kustomize "k8s/overlays/$PROFILE" \
            | sed "s|PROJECT_ID|${{ vars.GCP_PROJECT_ID }}|g; s|/frontend:latest|/frontend:$SHA|g" \
            | kubectl apply -f -
          kubectl -n shoot-seo rollout status deploy/shoot-seo-frontend --timeout=180s
